services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DOCKER_DB_DATABASE:-laravel}
      DB_USERNAME: ${DOCKER_DB_USERNAME:-laravel}
      DB_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: database
      REDIS_HOST: redis
    volumes:
      - public-storage:/var/www/html/storage/app/public
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - public-storage:/var/www/html/public/storage:ro
    depends_on:
      - app

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DOCKER_DB_DATABASE:-laravel}
      MYSQL_USER: ${DOCKER_DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DOCKER_DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DOCKER_DB_ROOT_PASSWORD:-root-secret}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DOCKER_DB_ROOT_PASSWORD:-root-secret}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
  redis-data:
  public-storage:
